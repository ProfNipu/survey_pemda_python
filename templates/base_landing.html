<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Page Title - Override in child templates -->
    <title>{% block title %}{{ app_name|default:"aplikasi-test" }} - {{ app_instansi|default:"Sistem Kepegawaian" }}{% endblock %}</title>
    
    {% load static %}
    
    <!-- Core CSS -->
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">
    <link href="{% static 'css/fontawesome.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/sweetalert2.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/landing-animated.css' %}" rel="stylesheet">
    
    <!-- Extra CSS Block -->
    {% block extra_css %}{% endblock %}
    
</head>
<body class="min-h-screen animated-gradient overflow-x-hidden relative" style="overflow-y: auto; -webkit-overflow-scrolling: touch;">
    <!-- Preloader Component -->
    {% include 'includes/preloader.html' with duration=3000 %}
    
    <!-- Animated Background Component -->
    {% include 'includes/animated_bg.html' %}
    
    <!-- Main Content -->
    <div class="min-h-screen flex items-center justify-center p-3 sm:p-4 relative z-10">
        {% block content %}
        <!-- Child templates will override this block -->
        {% endblock %}
    </div>
    
    <!-- Toast Notifications -->
    {% include 'includes/toast_messages.html' %}
    
    <!-- Core JavaScript -->
    <script src="{% static 'js/sweetalert2.min.js' %}"></script>
    <script src="{% static 'js/app.js' %}"></script>
    
    <!-- Extra JavaScript Block -->
    {% block extra_js %}{% endblock %}
</body>
</html>
