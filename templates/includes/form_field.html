{% if field.is_hidden %}
  {{ field }}
{% else %}
  <div>
    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}
      <p class="mt-1 text-xs text-gray-500">{{ field.help_text }}</p>
    {% endif %}
    {% if field.errors %}
      <div class="mt-1 text-sm text-red-600">
        {{ field.errors }}
      </div>
    {% endif %}
  </div>
{% endif %}
