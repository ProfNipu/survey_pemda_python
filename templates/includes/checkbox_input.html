<!-- Checkbox Input Component (Reusable) -->
<!-- Usage: include 'includes/checkbox_input.html' with field_id='remember' field_name='remember' label='Remember me' checked=False -->

<div class="mb-6 flex items-center">
    <input 
        type="checkbox" 
        id="{{ field_id }}"
        name="{{ field_name }}"
        {% if checked %}checked{% endif %}
        {% if required %}required{% endif %}
        class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
    >
    <label for="{{ field_id }}" class="ml-2 text-gray-700">
        {{ label }}
    </label>
</div>
