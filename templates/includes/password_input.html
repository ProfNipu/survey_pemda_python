<!-- Password Input Component (Reusable) -->
<!-- Usage: include 'includes/password_input.html' with field_id='password' field_name='password' placeholder='Enter password' icon_id='toggleIcon' label='Password' required=True minlength=8 -->

{% if label %}
<label class="block text-sm font-medium text-gray-700 mb-2">
    <i class="fas fa-lock mr-2"></i>{{ label }}
</label>
{% endif %}

<div class="relative">
    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <i class="fas fa-lock text-gray-400"></i>
    </div>
    <input 
        type="password" 
        id="{{ field_id }}"
        name="{{ field_name }}"
        {% if required %}required{% endif %}
        {% if minlength %}minlength="{{ minlength }}"{% endif %}
        class="w-full pl-12 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
        style="padding-top: 12px; padding-bottom: 12px; padding-right: 45px !important;"
        placeholder="{{ placeholder }}"
    >
    <button 
        type="button"
        onclick="togglePassword('{{ field_id }}', '{{ icon_id }}')"
        class="absolute text-gray-400 hover:text-gray-600 transition-colors focus:outline-none"
        style="right: 12px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;"
    >
        <i id="{{ icon_id }}" class="fas fa-eye" style="font-size: 14px;"></i>
    </button>
</div>

{% if help_text %}
<p class="text-xs text-gray-500 mt-1">{{ help_text }}</p>
{% endif %}
