<style>
  .filter-row { display: block; }
  .filter-label { font-size: 0.875rem; font-weight: 500; color: #374151; }
  .filter-colon-sep { display: none; }
  .filter-field { min-width: 0; }
  @media (min-width: 768px) {
    .filter-row {
      display: grid;
      grid-template-columns: 16rem 1rem 1fr;
      gap: 0.75rem;
      align-items: center;
    }
    .filter-colon-sep { display: block; width: 1rem; text-align: center; color: #6b7280; }
  }
</style>

<div class="space-y-4">
  <div class="filter-row">
    <label for="id_opd" class="filter-label">Pilih Unit Kerja</label>
    <div class="filter-colon-sep">:</div>
    <div class="filter-field">
      <select
        class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 bg-white text-gray-800 js-select-search focus:border-primary focus:ring-2 focus:ring-primary/25 focus:outline-none transition-all"
        name="id_opd"
        id="id_opd"
        data-select-search="on"
        data-search-threshold="1"
        data-search-placeholder="Cari unit kerja..."
        data-search-url="{% url 'manajemen_relasi_organisasi:ajax_unit_kerja_list' %}"
        data-initial-fetch="1"
        data-page-size="500"
        data-min-chars="0"
      >
        <option value="">Pilih Unit Kerja</option>
        {% if selected_opd %}
          <option value="{{ selected_opd.id_opd }}" selected>{% if selected_opd.no_urut %}{{ selected_opd.no_urut|stringformat:"02d" }}. {% endif %}{{ selected_opd.nm_opd }}</option>
        {% endif %}
      </select>
    </div>
  </div>

  <div class="filter-row">
    <label for="id_sub_opd" class="filter-label">Pilih Sub Unit Kerja</label>
    <div class="filter-colon-sep">:</div>
    <div class="filter-field">
      <select
        class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 bg-white text-gray-800 js-select-search focus:border-primary focus:ring-2 focus:ring-primary/25 focus:outline-none transition-all"
        name="id_sub_opd"
        id="id_sub_opd"
        data-select-search="on"
        data-search-threshold="1"
        data-search-placeholder="Cari sub unit kerja..."
        data-initial-fetch="1"
        data-page-size="5000"
        data-min-chars="0"
        disabled
        data-disabled-label="Pilih Unit Kerja dulu"
      >
        <option value="">Pilih Data Sub Unit Kerja</option>
        {% if selected_sub_opd %}
          <option value="{{ selected_sub_opd.id_opd }}" selected>{{ selected_sub_opd.nm_opd }}</option>
        {% endif %}
      </select>
    </div>
  </div>

  <div class="filter-row">
    <label for="caripegawai" class="filter-label">Nama atau NIP Pegawai</label>
    <div class="filter-colon-sep">:</div>
    <div class="filter-field">
      <input
        name="caripegawai"
        type="text"
        class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/25 focus:outline-none transition-all"
        id="caripegawai"
        value="{{ caripegawai|default:'' }}"
        placeholder=""
      />
    </div>
  </div>
</div>

<script>
(function(){
  function setSubUnitRemoteUrl(opdId, resetValue){
    var subSel = document.getElementById('id_sub_opd');
    if (!subSel) return;
    if (!opdId) {
      subSel.disabled = true;
      subSel.setAttribute('data-disabled-label','Pilih Unit Kerja dulu');
      subSel.removeAttribute('data-search-url');
      // reset value
      if (resetValue) {
        try { subSel.value = ''; subSel.dispatchEvent(new Event('change', {bubbles:true})); } catch(_) {}
      }
      return;
    }
    subSel.disabled = false;
    subSel.setAttribute('data-disabled-label','');
    var baseUrl = "{% url 'manajemen_relasi_organisasi:ajax_sub_unit_kerja_list' %}";
    subSel.setAttribute('data-search-url', baseUrl + '?parent_id=' + encodeURIComponent(opdId));
    // clear selected when parent changes
    if (resetValue) {
      try { subSel.value = ''; subSel.dispatchEvent(new Event('change', {bubbles:true})); } catch(_) {}
    }
  }

  function bind(){
    var opdSel = document.getElementById('id_opd');
    if (!opdSel) return;
    setSubUnitRemoteUrl(opdSel.value, false);
    opdSel.addEventListener('change', function(){
      setSubUnitRemoteUrl(opdSel.value, true);
      try { if (window.initSearchableSelect) window.initSearchableSelect(document.getElementById('id_sub_opd')); } catch(_) {}
    });
  }

  try { if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bind); else bind(); } catch(_) { }
})();
</script>
