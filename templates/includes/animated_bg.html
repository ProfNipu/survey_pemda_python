</div>

<script>
// Randomize icon and chart positions on every page load
document.addEventListener('DOMContentLoaded', function() {
    // Randomize icon positions
    const icons = document.querySelectorAll('.random-icon');
    icons.forEach(function(icon) {
        // Random top/bottom (0-95%)
        const vertical = Math.random() * 95;
        const useTop = Math.random() > 0.5;
        
        // Random left/right (0-45%)
        const horizontal = Math.random() * 45;
        const useLeft = Math.random() > 0.5;
        
        // Apply random position
        if (useTop) {
            icon.style.top = vertical + '%';
            icon.style.bottom = 'auto';
        } else {
            icon.style.bottom = vertical + '%';
            icon.style.top = 'auto';
        }
        
        if (useLeft) {
            icon.style.left = horizontal + '%';
            icon.style.right = 'auto';
        } else {
            icon.style.right = horizontal + '%';
            icon.style.left = 'auto';
        }
    });
    
    // Randomize chart positions (sama seperti icon)
    const charts = document.querySelectorAll('.random-chart');
    charts.forEach(function(chart) {
        // Random top/bottom (0-90%)
        const vertical = Math.random() * 90;
        const useTop = Math.random() > 0.5;
        
        // Random left/right (0-50%)
        const horizontal = Math.random() * 50;
        const useLeft = Math.random() > 0.5;
        
        // Apply random position
        if (useTop) {
            chart.style.top = vertical + '%';
            chart.style.bottom = 'auto';
        } else {
            chart.style.bottom = vertical + '%';
            chart.style.top = 'auto';
        }
        
        if (useLeft) {
            chart.style.left = horizontal + '%';
            chart.style.right = 'auto';
        } else {
            chart.style.right = horizontal + '%';
            chart.style.left = 'auto';
        }
    });
});
</script>
