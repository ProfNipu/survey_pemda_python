{% load render_table from django_tables2 %}

<div id="table-content" class="relative">
    {% include 'includes/datatable_loading.html' %}

    <div class="mb-5 flex justify-between items-center flex-wrap gap-2">
        <div class="text-sm">
            <span class="font-semibold text-gray-700">Total Modules:</span> <span class="text-gray-600">{{ total }}</span>
            <span id="dt-total-records" data-total="{{ total }}" class="hidden"></span>
            {% if search_query %}
            <span class="ml-2 inline-block bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">
                <i class="fas fa-filter mr-1"></i> Hasil pencarian: "{{ search_query }}"
            </span>
            {% endif %}
        </div>
        <div class="text-xs text-gray-500">
            <i class="fas fa-info-circle mr-1"></i> Click column headers to sort
        </div>
    </div>

    {% include 'includes/datatable_table_scroll.html' with table=table %}
</div>
