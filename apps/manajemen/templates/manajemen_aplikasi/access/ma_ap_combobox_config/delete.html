{% extends 'base_dashboard.html' %}

{% block page_title %}Hapus Konfigurasi Combo Box{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl p-8 shadow-lg">
  <h2 class="text-xl font-semibold text-gray-800 mb-3"><i class="fas fa-trash mr-2"></i> Hapus Konfigurasi</h2>
  <p class="text-gray-600 mb-6">Yakin hapus konfigurasi: <span class="font-semibold">{{ obj.label }}</span> (<code class="bg-gray-100 px-2 py-1 rounded">{{ obj.code }}</code>) ?</p>

  <form method="post">
    {% csrf_token %}
    <div class="flex gap-2">
      <button type="submit" class="bg-red-500 hover:bg-red-600 text-white font-medium py-2 px-4 rounded-lg transition-colors">
        <i class="fas fa-trash mr-2"></i> Hapus
      </button>
      <a href="{% url 'manajemen_aplikasi:combobox_config_list' %}" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-lg transition-colors">Batal</a>
    </div>
  </form>
</div>
{% endblock %}
